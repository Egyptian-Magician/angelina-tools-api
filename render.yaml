services:
  - type: web
    name: angelina-tools-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: SUPABASE_URL
        value: https://zonamomsphxmvyfvomkq.supabase.co
      - key: SUPABASE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
